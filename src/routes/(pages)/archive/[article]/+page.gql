query Article($article: String!) @cache(policy: CacheOrNetwork) {
  allArticle(where: { slug: { current: { eq: $article } } }) {
    _id
    title
    slug {
      current
    }
    tags {
      tagName
    }
    author
    published
    intro{
      title
      optionsList
      paragraph
      media{
        contentUrl
      }
    }
    preface{
      title
      optionsList
      media{
        asset{
          title
          
          source{
            url
         }
        }
      }
    }
    showcase {
      media {
        asset {
          url
        }
        hotspot {
          x
          y
          width
          height
        }
      }
    }
    body {
      paragraph
      title
    }
    brief {
      client
      date
      project
      projectType
    }
    links {
    icon{
      contentUrl{
        asset{
          url
          title          
        }
      }
      link
      title
    }
      url
    }
    preface {
      title
      optionsList
    }
  }
}
