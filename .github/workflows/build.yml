name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: prod
    env:
      HOME: /home/ghrunner
      PUBLIC_IS_PROD: ${{ secrets.PUBLIC_IS_PROD }}
      PUBLIC_SANITY_GQL_API: ${{ secrets.PUBLIC_SANITY_GQL_API }}
      PUBLIC_EMAILTO: ${{ secrets.PUBLIC_EMAILTO }}
      PUBLIC_BLOG_REPO: ${{ secrets.PUBLIC_BLOG_REPO }}
      GITHUB_API_KEY: ${{ secrets.GH_API_KEY }}
      SANITY_API_KEY: ${{ secrets.SANITY_API_KEY }}
      SANITY_APP_ID: ${{ secrets.SANITY_APP_ID }}
      MOONBASE_URL: ${{ secrets.MOONBASE_URL }}
      HOMEWORLD_URL: ${{ secrets.HOMEWORLD_URL }}

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        run: bun install

      - name: Build
        run: bun run build
